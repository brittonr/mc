# Consumer-owned Octet lint config for the Stevenarella client workspace.
#
# The repo-level Octet enforcement checker derives the required lint inventory
# from the pinned Octet input and verifies this deny list stays complete.
# Existing findings are tracked through the reviewed baseline; keep suppressions
# out of this file unless they are narrow, owned, justified, and tested.

[octet]

[octet.lint_levels]
compound_assertion = "deny"
function_length = "deny"
acronym_style = "deny"
numeric_units = "deny"
magic_number = "deny"
excessive_file_length = "deny"
module_file_count = "deny"
underscore_in_module_filename = "deny"
non_trait_imports = "deny"
renamed_imports = "deny"
path_segment_repetition = "deny"
unbounded_loop = "deny"
compound_condition = "deny"
verified_purity = "deny"
unjustified_allow = "deny"
nested_conditionals = "deny"
assertion_density = "deny"
multi_lock_ordering = "deny"
explicit_defaults = "deny"
unbounded_channel = "deny"
unbounded_collection_growth = "deny"
sentinel_fallback = "deny"
usize_in_public_api = "deny"
borrowed_argument_types = "deny"
deref_polymorphism = "deny"
clone_then_borrow = "deny"
too_many_parameters = "deny"
negated_predicate = "deny"
bool_naming = "deny"
ignored_result = "deny"
drop_must_use = "deny"
fallible_int_fallback = "deny"
unchecked_narrowing = "deny"
unchecked_division = "deny"
contradictory_time = "deny"
ambient_clock = "deny"
catch_all_on_enum = "deny"
platform_dependent_cast = "deny"
float_for_currency = "deny"
ambiguous_params = "deny"
raw_arithmetic_overflow = "deny"
no_unwrap = "deny"
no_panic = "deny"
public_unsafe_api = "deny"
no_todo = "deny"
unjustified_no_todo_allow = "deny"
no_recursion = "deny"
